    function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
    var today = new Date('2026-03-10');
    var activeCats = {}, currentRange = 'all';

    var activeGroup = null;
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykJgblfWpZCgA_41HEizcNFcz3Nw-vgYQM6dPXDcQm_JnVcsYugEHxV1QOSLpWkxQ/exec';
    var edits = {};
    try { edits = JSON.parse(localStorage.getItem('hac_edits') || '{}'); } catch(e) {}

    function applyEdits() {
      var splits = {};
      try { splits = JSON.parse(localStorage.getItem('hac_splits') || '{}'); } catch(ex) {}
      var result = [];
      DATA.forEach(function(r) {
        if (splits[r.id] && splits[r.id].length > 0) {
          splits[r.id].forEach(function(s, idx) {
            result.push({id: r.id + '_' + idx, d: s.d, v: s.v, c: s.c, a: s.a, g: s.g||r.g});
          });
        } else {
          var e = edits[r.id];
          if (!e) { result.push(r); }
          else { result.push({id:r.id, d:e.d||r.d, v:e.v||r.v, c:e.c||r.c, a:r.a, g:e.g||r.g}); }
        }
      });
      return result;
    }

    function loadEditsFromSheet() {
      if (!SCRIPT_URL) return;
      fetch(SCRIPT_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var editsData = data.edits || data;
          for (var k in editsData) edits[k] = editsData[k];
          localStorage.setItem('hac_edits', JSON.stringify(edits));
          if (data.splits) {
            localStorage.setItem('hac_splits', JSON.stringify(data.splits));
          }
          render(currentRange);
        })
        .catch(function() {});
    }

    function getRange(type) {
      var y=today.getFullYear(), m=today.getMonth(), d=today.getDate(), dow=today.getDay();
      if (type==='last-week') { var s=new Date(today); s.setDate(d-dow-7); var e=new Date(today); e.setDate(d-dow-1); return [s,e]; }
      if (type==='month') return [new Date(y,m,1),today];
      if (type==='last-month') return [new Date(y,m-1,1),new Date(y,m,0)];
      if (type==='quarter') return [new Date(y,m-(m%3),1),today];
      if (type==='ytd') return [new Date(y,0,1),today];
      if (type==='all') return [new Date('2025-01-01'),today];
      return [new Date(document.getElementById('startDate').value),new Date(document.getElementById('endDate').value)];
    }



    function render(rangeType) {
      currentRange = rangeType;
      var rng=getRange(rangeType), start=rng[0], end=rng[1];
      var edited=applyEdits();
      var filtered=edited.filter(function(r){var d=new Date(r.d);return d>=start&&d<=end;});
      var cats={};
      filtered.forEach(function(r){if(!cats[r.c])cats[r.c]={total:0,count:0,txns:[]};cats[r.c].total+=r.a;cats[r.c].count++;cats[r.c].txns.push(r);});
      var sorted=Object.entries(cats).sort(function(a,b){return b[1].total-a[1].total;});
      var grandTotal=sorted.reduce(function(s,x){return s+x[1].total;},0);
      document.getElementById('grandTotal').textContent=fmt(grandTotal);
      document.getElementById('txnCount').textContent=filtered.length;
      var labels={'last-week':'Last Week',month:'This Month','last-month':'Last Month',quarter:'This Quarter',ytd:'Year to Date',all:'All Time',custom:start.toLocaleDateString()+' - '+end.toLocaleDateString()};
      document.getElementById('periodLabel').textContent=labels[rangeType]||'';

      // Build groups from data's "g" field
      var groupData = {};
      var groupOrder = [];
      sorted.forEach(function(entry) {
        var cat = entry[0], data = entry[1];
        // Get the group from the first transaction in this category
        var grp = data.txns[0].g || 'Other';
        if (!groupData[grp]) { groupData[grp] = {total: 0, count: 0, cats: []}; groupOrder.push(grp); }
        groupData[grp].total += data.total;
        groupData[grp].count += data.count;
        groupData[grp].cats.push(entry);
      });

      // Sort groups by total descending
      groupOrder.sort(function(a,b){ return Math.abs(groupData[b].total) - Math.abs(groupData[a].total); });
      var sortedGroups = groupOrder;

      var maxGroupVal = sortedGroups.length ? Math.max.apply(null, sortedGroups.map(function(g){return Math.abs(groupData[g].total);})) : 1;

      var container = document.getElementById('categories');
      container.innerHTML = sortedGroups.map(function(grpName) {
        var grp = groupData[grpName];
        var grpNeg = grp.total < 0;
        var grpPct = Math.max(0, (Math.abs(grp.total) / maxGroupVal) * 100);
        var grpOpen = activeGroup === grpName;

        var catHtml = '';
        if (grpOpen) {
          var maxCatVal = grp.cats.length ? Math.max.apply(null, grp.cats.map(function(x){return Math.abs(x[1].total);})) : 1;
          catHtml = '<div class="group-categories">' + grp.cats.map(function(entry) {
            var cat = entry[0], data = entry[1];
            var catPct = Math.max(0, (Math.abs(data.total) / maxCatVal) * 100);
            var isNeg = data.total < 0, isOpen = !!activeCats[cat];
            var txnRows = data.txns.sort(function(a,b){return b.d.localeCompare(a.d);}).map(function(t){
              var tNeg = t.a < 0;
              return '<tr><td>'+t.d+'</td><td>'+t.v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\'/g,'&#39;')+'</td><td class="amount'+(tNeg?' negative':'')+'">'+( tNeg?'-':'')+fmt(t.a)+'</td></tr>';
            }).join('');
            return '<div class="cat-row"><div class="cat-header" data-cat="'+cat.replace(/"/g,'&quot;')+'">'
              +'<span class="cat-toggle">'+(isOpen?'&#9660;':'&#9654;')+'</span>'
              +'<span class="cat-name">'+cat+'</span>'
              +'<span class="cat-meta">'+data.count+' txn'+(data.count!==1?'s':'')+'</span>'
              +'<span class="cat-amount'+(isNeg?' negative':'')+'">'+( isNeg?'-':'')+fmt(data.total)+'</span>'
              +'</div><div class="cat-bar-bg"><div class="cat-bar" style="width:'+catPct+'%"></div></div>'
              +(isOpen?'<div class="cat-detail"><table><thead><tr><th>Date</th><th>Payee</th><th class="amount">Amount</th></tr></thead><tbody>'+txnRows+'</tbody></table></div>':'')
              +'</div>';
          }).join('') + '</div>';
        }

        return '<div class="group-row"><div class="group-header" data-group="'+grpName.replace(/"/g,'&quot;')+'">'
          +'<span class="cat-toggle">'+(grpOpen?'&#9660;':'&#9654;')+'</span>'
          +'<span class="cat-name" style="font-weight:700">'+grpName+'</span>'
          +'<span class="cat-meta">'+grp.count+' txn'+(grp.count!==1?'s':'')+'</span>'
          +'<span class="cat-amount'+(grpNeg?' negative':'')+'">'+( grpNeg?'-':'')+fmt(grp.total)+'</span>'
          +'</div><div class="cat-bar-bg"><div class="cat-bar" style="width:'+grpPct+'%"></div></div>'
          +catHtml+'</div>';
      }).join('');

      // Group header click handlers
      var grpHdrs = container.getElementsByClassName('group-header');
      for (var i = 0; i < grpHdrs.length; i++) {
        grpHdrs[i].onclick = (function(el){return function(){
          var g = el.getAttribute('data-group');
          activeGroup = activeGroup === g ? null : g;
          activeCats = {};
          render(currentRange);
        };})(grpHdrs[i]);
      }
      // Category header click handlers
      var hdrs = container.getElementsByClassName('cat-header');
      for (var i = 0; i < hdrs.length; i++) {
        hdrs[i].onclick = (function(el){return function(){
          var c = el.getAttribute('data-cat'); if (activeCats[c]) delete activeCats[c]; else activeCats[c] = true;
          render(currentRange);
        };})(hdrs[i]);
      }
    }

    var btns=document.querySelectorAll('.filter-btn');
    for(var i=0;i<btns.length;i++){
      btns[i].onclick=(function(btn){return function(){
        for(var j=0;j<btns.length;j++)btns[j].classList.remove('active');
        btn.classList.add('active');activeCats={};render(btn.getAttribute('data-range'));
      };})(btns[i]);
    }
    render('all');
    loadEditsFromSheet();

  </script>
