    function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
    var today = new Date('2026-03-10');
    var activeCat = null, currentRange = 'all';
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykJgblfWpZCgA_41HEizcNFcz3Nw-vgYQM6dPXDcQm_JnVcsYugEHxV1QOSLpWkxQ/exec';
    var edits = {};
    try { edits = JSON.parse(localStorage.getItem('hac_edits') || '{}'); } catch(e) {}

    function applyEdits() {
      return DATA.map(function(r) {
        var e = edits[r.id]; if (!e) return r;
        return {id:r.id, d:e.d||r.d, v:e.v||r.v, c:e.c||r.c, a:r.a};
      });
    }

    function loadEditsFromSheet() {
      if (!SCRIPT_URL) return;
      fetch(SCRIPT_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          for (var k in data) edits[k] = data[k];
          localStorage.setItem('hac_edits', JSON.stringify(edits));
          render(currentRange);
        })
        .catch(function() {});
    }

    function getRange(type) {
      var y=today.getFullYear(), m=today.getMonth(), d=today.getDate(), dow=today.getDay();
      if (type==='week') { var s=new Date(today); s.setDate(d-dow); return [s,today]; }
      if (type==='month') return [new Date(y,m,1),today];
      if (type==='last-month') return [new Date(y,m-1,1),new Date(y,m,0)];
      if (type==='quarter') return [new Date(y,m-(m%3),1),today];
      if (type==='ytd') return [new Date(y,0,1),today];
      if (type==='all') return [new Date('2025-01-01'),today];
      return [new Date(document.getElementById('startDate').value),new Date(document.getElementById('endDate').value)];
    }

    function render(rangeType) {
      currentRange = rangeType;
      var rng=getRange(rangeType), start=rng[0], end=rng[1];
      var edited=applyEdits();
      var filtered=edited.filter(function(r){var d=new Date(r.d);return d>=start&&d<=end;});
      var cats={};
      filtered.forEach(function(r){if(!cats[r.c])cats[r.c]={total:0,count:0,txns:[]};cats[r.c].total+=r.a;cats[r.c].count++;cats[r.c].txns.push(r);});
      var sorted=Object.entries(cats).sort(function(a,b){return b[1].total-a[1].total;});
      var grandTotal=sorted.reduce(function(s,x){return s+x[1].total;},0);
      document.getElementById('grandTotal').textContent=fmt(grandTotal);
      document.getElementById('txnCount').textContent=filtered.length;
      var labels={week:'This Week',month:'This Month','last-month':'Last Month',quarter:'This Quarter',ytd:'Year to Date',all:'All Time',custom:start.toLocaleDateString()+' - '+end.toLocaleDateString()};
      document.getElementById('periodLabel').textContent=labels[rangeType]||'';
      var maxVal=sorted.length?Math.max.apply(null,sorted.map(function(x){return x[1].total;})):1;
      var container=document.getElementById('categories');
      container.innerHTML=sorted.map(function(entry){
        var cat=entry[0],data=entry[1];
        var pct=Math.max(0,(data.total/maxVal)*100), isNeg=data.total<0, isOpen=activeCat===cat;
        var txnRows=data.txns.sort(function(a,b){return b.d.localeCompare(a.d);}).map(function(t){
          var tNeg=t.a<0;
          return '<tr><td>'+t.d+'</td><td>'+t.v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\'/g,'&#39;')+'</td><td class="amount'+(tNeg?' negative':'')+'">'+( tNeg?'-':'')+fmt(t.a)+'</td></tr>';
        }).join('');
        return '<div class="cat-row"><div class="cat-header" data-cat="'+cat.replace(/"/g,'&quot;')+'">'
          +'<span class="cat-toggle">'+(isOpen?'&#9660;':'&#9654;')+'</span>'
          +'<span class="cat-name">'+cat+'</span>'
          +'<span class="cat-meta">'+data.count+' txn'+(data.count!==1?'s':'')+'</span>'
          +'<span class="cat-amount'+(isNeg?' negative':'')+'">'+( isNeg?'-':'')+fmt(data.total)+'</span>'
          +'</div><div class="cat-bar-bg"><div class="cat-bar" style="width:'+pct+'%"></div></div>'
          +(isOpen?'<div class="cat-detail"><table><thead><tr><th>Date</th><th>Payee</th><th class="amount">Amount</th></tr></thead><tbody>'+txnRows+'</tbody></table></div>':'')
          +'</div>';
      }).join('');
      var hdrs=container.getElementsByClassName('cat-header');
      for(var i=0;i<hdrs.length;i++){
        hdrs[i].onclick=(function(el){return function(){activeCat=activeCat===el.getAttribute('data-cat')?null:el.getAttribute('data-cat');render(currentRange);};})(hdrs[i]);
      }
    }

    var btns=document.querySelectorAll('.filter-btn');
    for(var i=0;i<btns.length;i++){
      btns[i].onclick=(function(btn){return function(){
        for(var j=0;j<btns.length;j++)btns[j].classList.remove('active');
        btn.classList.add('active');activeCat=null;render(btn.getAttribute('data-range'));
      };})(btns[i]);
    }
    render('all');
    loadEditsFromSheet();
