<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses - Highland Accounting</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container wide">
    <a href="index.html" class="back">&larr; Back to Home</a>
    <h1>Expenses</h1>
    <p class="subtitle">Spending by category from QuickBooks</p>

    <div class="filters">
      <button class="filter-btn" data-range="week">This Week</button>
      <button class="filter-btn" data-range="month">This Month</button>
      <button class="filter-btn" data-range="last-month">Last Month</button>
      <button class="filter-btn" data-range="quarter">This Quarter</button>
      <button class="filter-btn" data-range="ytd">Year to Date</button>
      <button class="filter-btn active" data-range="all">All Time</button>
      <div class="custom-range">
        <input type="date" id="startDate" value="2025-10-29">
        <span>to</span>
        <input type="date" id="endDate" value="2026-03-07">
        <button class="filter-btn" data-range="custom">Apply</button>
      </div>
    </div>

    <div class="summary-bar">
      <div class="summary-total">Total: <strong id="grandTotal">$0</strong></div>
      <div class="summary-count"><span id="txnCount">0</span> transactions</div>
      <div class="summary-period" id="periodLabel">All Time</div>
    </div>

    <div id="categories"></div>

    <p class="footer-note">Data sourced from QuickBooks &middot; Last updated March 10, 2026</p>
  </div>

  <script>
    let DATA = [];
    const fmt = n => '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const today = new Date('2026-03-10');
    let activeCat = null;
    let currentRange = 'all';

    function applyEdits(data) {
      const edits = JSON.parse(localStorage.getItem('hac_edits') || '{}');
      return data.map(r => {
        if (edits[r.id] && edits[r.id].c) return {...r, c: edits[r.id].c};
        return r;
      });
    }

    function getRange(type) {
      const y = today.getFullYear(), m = today.getMonth(), d = today.getDate();
      const dow = today.getDay();
      switch(type) {
        case 'week': { const s = new Date(today); s.setDate(d - dow); return [s, today]; }
        case 'month': return [new Date(y, m, 1), today];
        case 'last-month': return [new Date(y, m-1, 1), new Date(y, m, 0)];
        case 'quarter': { const qm = m - (m % 3); return [new Date(y, qm, 1), today]; }
        case 'ytd': return [new Date(y, 0, 1), today];
        case 'all': return [new Date('2025-01-01'), today];
        case 'custom': {
          return [new Date(document.getElementById('startDate').value), new Date(document.getElementById('endDate').value)];
        }
      }
    }

    function render(rangeType) {
      currentRange = rangeType;
      const [start, end] = getRange(rangeType);
      const edited = applyEdits(DATA);
      const filtered = edited.filter(r => { const d = new Date(r.d); return d >= start && d <= end; });

      const cats = {};
      filtered.forEach(r => {
        if (!cats[r.c]) cats[r.c] = {total: 0, count: 0, txns: []};
        cats[r.c].total += r.a;
        cats[r.c].count++;
        cats[r.c].txns.push(r);
      });

      const sorted = Object.entries(cats).sort((a, b) => b[1].total - a[1].total);
      const grandTotal = sorted.reduce((s, [, v]) => s + v.total, 0);

      document.getElementById('grandTotal').textContent = fmt(grandTotal);
      document.getElementById('txnCount').textContent = filtered.length;

      const labels = {
        week: 'This Week', month: 'This Month', 'last-month': 'Last Month',
        quarter: 'This Quarter', ytd: 'Year to Date', all: 'All Time',
        custom: start.toLocaleDateString() + ' - ' + end.toLocaleDateString()
      };
      document.getElementById('periodLabel').textContent = labels[rangeType] || '';

      const maxVal = sorted.length ? Math.max(...sorted.map(([,v]) => v.total)) : 1;
      const container = document.getElementById('categories');
      container.innerHTML = sorted.map(([cat, data]) => {
        const pct = Math.max(0, (data.total / maxVal) * 100);
        const isNeg = data.total < 0;
        const isOpen = activeCat === cat;
        const txnRows = data.txns
          .sort((a, b) => b.d.localeCompare(a.d))
          .map(t => {
            const tNeg = t.a < 0;
            return '<tr><td>' + t.d + '</td><td>' + t.v.replace(/'/g, '&#39;') + '</td><td class="amount ' + (tNeg ? 'negative' : '') + '">' + (tNeg ? '-' : '') + fmt(t.a) + '</td></tr>';
          }).join('');

        return '<div class="cat-row">' +
          '<div class="cat-header" data-cat="' + cat.replace(/"/g, '&quot;') + '">' +
            '<span class="cat-toggle">' + (isOpen ? '&#9660;' : '&#9654;') + '</span>' +
            '<span class="cat-name">' + cat + '</span>' +
            '<span class="cat-meta">' + data.count + ' txn' + (data.count !== 1 ? 's' : '') + '</span>' +
            '<span class="cat-amount ' + (isNeg ? 'negative' : '') + '">' + (isNeg ? '-' : '') + fmt(data.total) + '</span>' +
          '</div>' +
          '<div class="cat-bar-bg"><div class="cat-bar" style="width:' + pct + '%"></div></div>' +
          (isOpen ? '<div class="cat-detail"><table><thead><tr><th>Date</th><th>Payee</th><th class="amount">Amount</th></tr></thead><tbody>' + txnRows + '</tbody></table></div>' : '') +
        '</div>';
      }).join('');

      container.querySelectorAll('.cat-header').forEach(el => {
        el.addEventListener('click', () => {
          activeCat = activeCat === el.dataset.cat ? null : el.dataset.cat;
          render(currentRange);
        });
      });
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeCat = null;
        render(btn.dataset.range);
      });
    });

    fetch('data/expenses.json')
      .then(r => r.json())
      .then(data => { DATA = data; render('all'); });
  </script>
</body>
</html>
