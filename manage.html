<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Data - Highland Accounting</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container wide">
    <a href="index.html" class="back">&larr; Back to Home</a>
    <h1>Manage Transactions</h1>
    <p class="subtitle">Click a transaction to edit it</p>

    <div class="manage-toolbar">
      <div class="manage-search">
        <input type="text" id="searchBox" placeholder="Search by payee, category, or amount...">
      </div>
      <div class="manage-info">
        <span id="editCount">0</span> edits &middot;
        <button class="filter-btn" id="resetBtn">Reset All Edits</button>
        <button class="filter-btn" id="exportBtn">Export Edits</button>
      </div>
    </div>

    <div class="manage-table-wrap">
      <table id="txnTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Payee</th>
            <th>Category</th>
            <th class="amount">Amount</th>
          </tr>
        </thead>
        <tbody id="txnBody"></tbody>
      </table>
    </div>

    <p class="footer-note">Edits are saved in your browser &middot; They apply to the Expenses page too</p>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h3>Edit Transaction</h3>
      <div class="modal-field">
        <label for="modalDate">Date</label>
        <input type="date" id="modalDate">
      </div>
      <div class="modal-field">
        <label for="modalPayee">Payee</label>
        <input type="text" id="modalPayee">
      </div>
      <div class="modal-field">
        <label>Amount</label>
        <span id="modalAmount"></span>
      </div>
      <div class="modal-field">
        <label for="modalCategory">Category</label>
        <select id="modalCategory"><option value="Advertising/Promotional">Advertising/Promotional</option><option value="Animal Processing">Animal Processing</option><option value="Animal Supplies">Animal Supplies</option><option value="Animal care  - labor">Animal care  - labor</option><option value="Auto">Auto</option><option value="Bank Charges">Bank Charges</option><option value="Barn Supplies">Barn Supplies</option><option value="Chase Ink">Chase Ink</option><option value="Cleaning Essentials">Cleaning Essentials</option><option value="Cleaning Services">Cleaning Services</option><option value="Cleaning Services - Hospitality Essentials">Cleaning Services - Hospitality Essentials</option><option value="Cleaning Services - Labor">Cleaning Services - Labor</option><option value="Credit Card Processing">Credit Card Processing</option><option value="Equipment Rental">Equipment Rental</option><option value="Farm Management">Farm Management</option><option value="Farm Store Expenses">Farm Store Expenses</option><option value="Farm supplies">Farm supplies</option><option value="Forest lighting">Forest lighting</option><option value="Highland Farms - Cow Craving">Highland Farms - Cow Craving</option><option value="Highland Farms - Front Gate">Highland Farms - Front Gate</option><option value="Highland Farms - Hot tubs">Highland Farms - Hot tubs</option><option value="Highland Farms - Pasture">Highland Farms - Pasture</option><option value="Highland Farms - Tiny house">Highland Farms - Tiny house</option><option value="Highland Farms Cottage - Maintenance">Highland Farms Cottage - Maintenance</option><option value="Highland Farms Cottage - Supplies">Highland Farms Cottage - Supplies</option><option value="Highland Farms Lodge - Maintenance">Highland Farms Lodge - Maintenance</option><option value="Highland Reserve - Business License">Highland Reserve - Business License</option><option value="Highland Reserve - land improvement">Highland Reserve - land improvement</option><option value="Insurance">Insurance</option><option value="Labor - Farm Hand">Labor - Farm Hand</option><option value="Labor - Tour Education">Labor - Tour Education</option><option value="Land Improvements">Land Improvements</option><option value="Livestock Feed">Livestock Feed</option><option value="Meals & Entertainment">Meals & Entertainment</option><option value="Mortgage Payable - Newrez / Shellpoint">Mortgage Payable - Newrez / Shellpoint</option><option value="Office/General Administrative Expenses">Office/General Administrative Expenses</option><option value="PAL loan repayment">PAL loan repayment</option><option value="Partner's Equity - Connor McWilliams">Partner's Equity - Connor McWilliams</option><option value="Pest Control">Pest Control</option><option value="Repairs & Maintenance">Repairs & Maintenance</option><option value="Spa - Installation">Spa - Installation</option><option value="Supplies & Materials">Supplies & Materials</option><option value="Transfer">Transfer</option><option value="Transient Occupancy Tax">Transient Occupancy Tax</option><option value="Travel">Travel</option><option value="Utilities">Utilities</option><option value="Website Expenses">Website Expenses</option><option value="Wedding/Event expenses">Wedding/Event expenses</option></select>
      </div>
      <div class="modal-field">
        <label for="modalCustomCat">Or type a new category</label>
        <input type="text" id="modalCustomCat" placeholder="Leave blank to use dropdown">
      </div>
      <div class="modal-actions">
        <button class="filter-btn" id="modalCancel">Cancel</button>
        <button class="filter-btn active" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    var fmt = function(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); };
    var baseData = [];
    var edits = {};

    try {
      edits = JSON.parse(localStorage.getItem('hac_edits') || '{}');
    } catch(e) {
      edits = {};
    }

    function applyEdits(r) {
      var e = edits[r.id];
      if (!e) return r;
      var out = {id: r.id, d: e.d || r.d, v: e.v || r.v, c: e.c || r.c, a: r.a};
      out._edited = (out.d !== r.d || out.v !== r.v || out.c !== r.c);
      return out;
    }

    function getEditedData() {
      return baseData.map(applyEdits);
    }

    function saveEdits() {
      localStorage.setItem('hac_edits', JSON.stringify(edits));
      document.getElementById('editCount').textContent = Object.keys(edits).length;
    }

    function renderTable(filter) {
      var data = getEditedData();
      var q = (filter || '').toLowerCase();
      var filtered = q ? data.filter(function(r) {
        return r.v.toLowerCase().indexOf(q) !== -1 ||
          r.c.toLowerCase().indexOf(q) !== -1 ||
          r.a.toString().indexOf(q) !== -1 ||
          r.d.indexOf(q) !== -1;
      }) : data;

      var tbody = document.getElementById('txnBody');
      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var r = filtered[i];
        var isNeg = r.a < 0;
        var edited = r._edited ? ' edited' : '';
        var badge = r._edited ? ' <span class="edit-badge">edited</span>' : '';
        html += '<tr class="txn-row' + edited + '" data-id="' + r.id + '">' +
          '<td>' + r.d + '</td>' +
          '<td>' + r.v.replace(/'/g, '&#39;') + '</td>' +
          '<td class="cat-cell">' + r.c + badge + '</td>' +
          '<td class="amount ' + (isNeg ? 'negative' : '') + '">' + (isNeg ? '-' : '') + fmt(r.a) + '</td>' +
        '</tr>';
      }
      tbody.innerHTML = html;

      var rows = tbody.querySelectorAll('.txn-row');
      for (var j = 0; j < rows.length; j++) {
        (function(row) {
          row.addEventListener('click', function() {
            openModal(parseInt(row.getAttribute('data-id')));
          });
        })(rows[j]);
      }
    }

    function openModal(id) {
      var r = getEditedData().filter(function(x) { return x.id === id; })[0];
      if (!r) return;
      document.getElementById('modalDate').value = r.d;
      document.getElementById('modalPayee').value = r.v;
      document.getElementById('modalAmount').textContent = (r.a < 0 ? '-' : '') + fmt(r.a);
      document.getElementById('modalCategory').value = r.c;
      document.getElementById('modalCustomCat').value = '';

      // If category not in dropdown, put it in custom field
      var sel = document.getElementById('modalCategory');
      var found = false;
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === r.c) { found = true; break; }
      }
      if (!found) {
        document.getElementById('modalCustomCat').value = r.c;
      }

      var modal = document.getElementById('editModal');
      modal.classList.remove('hidden');
      modal.setAttribute('data-id', id);
    }

    document.getElementById('modalCancel').addEventListener('click', function() {
      document.getElementById('editModal').classList.add('hidden');
    });

    document.getElementById('modalSave').addEventListener('click', function() {
      var modal = document.getElementById('editModal');
      var id = parseInt(modal.getAttribute('data-id'));
      var newDate = document.getElementById('modalDate').value;
      var newPayee = document.getElementById('modalPayee').value.trim();
      var custom = document.getElementById('modalCustomCat').value.trim();
      var selected = document.getElementById('modalCategory').value;
      var newCat = custom || selected;

      var original = null;
      for (var i = 0; i < baseData.length; i++) {
        if (baseData[i].id === id) { original = baseData[i]; break; }
      }

      if (original) {
        var hasChanges = (newDate !== original.d || newPayee !== original.v || newCat !== original.c);
        if (hasChanges) {
          edits[id] = {};
          if (newDate !== original.d) edits[id].d = newDate;
          if (newPayee !== original.v) edits[id].v = newPayee;
          if (newCat !== original.c) edits[id].c = newCat;
        } else {
          delete edits[id];
        }
      }

      saveEdits();
      modal.classList.add('hidden');
      renderTable(document.getElementById('searchBox').value);
    });

    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target.id === 'editModal') {
        document.getElementById('editModal').classList.add('hidden');
      }
    });

    document.getElementById('searchBox').addEventListener('input', function(e) {
      renderTable(e.target.value);
    });

    document.getElementById('resetBtn').addEventListener('click', function() {
      if (confirm('Reset all edits? This cannot be undone.')) {
        edits = {};
        saveEdits();
        renderTable(document.getElementById('searchBox').value);
      }
    });

    document.getElementById('exportBtn').addEventListener('click', function() {
      var data = getEditedData();
      var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'expenses-edited.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    // Load data
    fetch('data/expenses.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        baseData = data;
        saveEdits();
        renderTable();
      })
      .catch(function(err) {
        document.getElementById('txnBody').innerHTML = '<tr><td colspan="4">Error loading data: ' + err.message + '</td></tr>';
      });
  </script>
</body>
</html>
