<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Data - Highland Accounting</title>
  <link rel="stylesheet" href="style.css">

<body>
  <div class="container wide">
    <a href="index.html" class="back">&larr; Back to Home</a>
    <h1>Manage Transactions</h1>
    <p class="subtitle">Click a transaction to edit it</p>

    <div class="manage-toolbar">
      <div class="manage-search">
        <input type="text" id="searchBox" placeholder="Search by payee, category, or amount...">
      </div>
      <div class="manage-info">
        <span id="editCount">0</span> edits &middot;
        <span id="syncStatus" style="color:#888;font-size:0.85em;"></span>
        <button class="filter-btn" id="resetBtn">Reset All Edits</button>
        <button class="filter-btn" id="exportBtn">Export Edits</button>
        <button class="filter-btn" id="settingsBtn" title="Connect to Google Sheets">&#9881; Sync</button>
      </div>
    </div>

    <div class="manage-table-wrap">
      <table id="txnTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Payee</th>
            <th>Category</th>
            <th>Group</th>
            <th class="amount">Amount</th>
          </tr>
        </thead>
        <tbody id="txnBody"></tbody>
      </table>
    </div>

    <p class="footer-note">Edits and splits sync to Google Sheets &middot; They apply to the Expenses page too</p>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h3>Edit Transaction</h3>
      <div class="modal-field">
        <label for="modalDate">Date</label>
        <input type="date" id="modalDate">
      </div>
      <div class="modal-field">
        <label for="modalPayee">Payee</label>
        <input type="text" id="modalPayee">
      </div>
      <div class="modal-field">
        <label>Amount</label>
        <span id="modalAmount"></span>
      </div>
      <div class="modal-field">

    function fmt(n) { return '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }

    function applyOne(r) {
      var e = edits[r.id];
      if (!e) return {id:r.id, d:r.d, v:r.v, c:r.c, a:r.a, _edited:false};
      return {id:r.id, d:e.d||r.d, v:e.v||r.v, c:e.c||r.c, a:r.a, _edited:true};
    }

    function saveEdits() {
      localStorage.setItem('hac_edits', JSON.stringify(edits));
      document.getElementById('editCount').textContent = Object.keys(edits).length;
    }

    function syncEditToSheet(id) {
      if (!SCRIPT_URL) return;
      var e = edits[id];
      var body = e ? {id: id, d: e.d || '', v: e.v || '', c: e.c || '', g: e.g || ''} : {id: id, delete: true};
      fetch(SCRIPT_URL, {method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify(body)});
    }

    function loadEditsFromSheet() {
      if (!SCRIPT_URL) return;
      document.getElementById('syncStatus').textContent = 'Syncing...';
      fetch(SCRIPT_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var merged = {};
          for (var k in data.edits || data) merged[k] = data.edits ? data.edits[k] : data[k];
          for (var k in edits) merged[k] = edits[k];
          edits = merged;
          if (data.splits) {
            for (var k in data.splits) splits[k] = data.splits[k];
            localStorage.setItem('hac_splits', JSON.stringify(splits));
          }
          saveEdits();
          renderTable(document.getElementById('searchBox').value);
          document.getElementById('syncStatus').textContent = 'Synced';
          setTimeout(function() { document.getElementById('syncStatus').textContent = ''; }, 2000);
        })
        .catch(function() {
          document.getElementById('syncStatus').textContent = 'Offline mode';
          setTimeout(function() { document.getElementById('syncStatus').textContent = ''; }, 2000);
        });
    }

    function renderTable(filter) {
      var q = (filter || '').toLowerCase();
      var html = '';
      for (var i = 0; i < baseData.length; i++) {
        var r = applyOne(baseData[i]);
        if (q && r.v.toLowerCase().indexOf(q) === -1 && r.c.toLowerCase().indexOf(q) === -1 && r.a.toString().indexOf(q) === -1 && r.d.indexOf(q) === -1) continue;
        var isNeg = r.a < 0;
        html += '<tr class="txn-row' + (r._edited ? ' edited' : '') + '" data-id="' + r.id + '">' +
          '<td>' + r.d + '</td>' +
          '<td>' + r.v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\'/g,'&#39;') + '</td>' +
          '<td class="cat-cell">' + r.c + (splits[r.id] ? ' <span class="edit-badge" style="background:#e3f2fd;color:#1565c0;">split</span>' : (r._edited ? ' <span class="edit-badge">edited</span>' : '')) + '</td>' +
          '<td>' + ((edits[r.id] && edits[r.id].g) || r.g || '') + '</td>' +
          '<td class="amount' + (isNeg ? ' negative' : '') + '">' + (isNeg ? '-' : '') + fmt(r.a) + '</td></tr>';
      }
      document.getElementById('txnBody').innerHTML = html;
      var rows = document.getElementById('txnBody').getElementsByClassName('txn-row');
      for (var j = 0; j < rows.length; j++) {
        rows[j].onclick = (function(row) {
          return function() { openModal(parseInt(row.getAttribute('data-id'))); };
        })(rows[j]);
      }
    }

    function openModal(id) {
      var r = applyOne(baseData[id]);
      document.getElementById('modalDate').value = r.d;
      document.getElementById('modalPayee').value = r.v;
      document.getElementById('modalAmount').textContent = (r.a < 0 ? '-' : '') + fmt(r.a);
      var sel = document.getElementById('modalCategory');
      sel.value = r.c;
      if (sel.value !== r.c) {
        document.getElementById('modalCustomCat').value = r.c;
      } else {
        document.getElementById('modalCustomCat').value = '';
      }
      var grpSel = document.getElementById('modalGroup');
      grpSel.value = (edits[id] && edits[id].g) ? edits[id].g : '';
      document.getElementById('editModal').className = 'modal';
      document.getElementById('editModal').setAttribute('data-id', id);
    }

    document.getElementById('modalCancel').onclick = function() {
      document.getElementById('editModal').className = 'modal hidden';
    };

    document.getElementById('editModal').onclick = function(e) {
      if (e.target.id === 'editModal') document.getElementById('editModal').className = 'modal hidden';
    };

    document.getElementById('modalSave').onclick = function() {
      var id = parseInt(document.getElementById('editModal').getAttribute('data-id'));
      var orig = baseData[id];
      var newDate = document.getElementById('modalDate').value;
      var newPayee = document.getElementById('modalPayee').value.trim();
      var custom = document.getElementById('modalCustomCat').value.trim();
      var newCat = custom || document.getElementById('modalCategory').value;
      var newGroup = document.getElementById('modalGroup').value;
      var changed = {};
      if (newDate !== orig.d) changed.d = newDate;
      if (newPayee !== orig.v) changed.v = newPayee;
      if (newCat !== orig.c) changed.c = newCat;
      if (newGroup) changed.g = newGroup;
      if (Object.keys(changed).length > 0) {
        edits[id] = changed;
      } else {
        delete edits[id];
      }
      saveEdits();
      syncEditToSheet(id);
      document.getElementById('editModal').className = 'modal hidden';
      renderTable(document.getElementById('searchBox').value);
    };

    document.getElementById('modalSplit').onclick = function() {
      var id = parseInt(document.getElementById('editModal').getAttribute('data-id'));
      document.getElementById('editModal').className = 'modal hidden';
      window.location = 'split.html?id=' + id;
    };

    document.getElementById('searchBox').oninput = function() { renderTable(this.value); };

    document.getElementById('resetBtn').onclick = function() {

        var oldIds = Object.keys(edits);
        edits = {};
        saveEdits();
        oldIds.forEach(function(id) { syncEditToSheet(parseInt(id)); });
        renderTable(document.getElementById('searchBox').value);
      }
    };

    document.getElementById('exportBtn').onclick = function() {
      var out = [];
      for (var i = 0; i < baseData.length; i++) out.push(applyOne(baseData[i]));
      var blob = new Blob([JSON.stringify(out, null, 2)], {type: 'application/json'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'expenses-edited.json';
      a.click();
    };

    document.getElementById('settingsBtn').onclick = function() {
      var url = prompt('Enter your Google Apps Script Web App URL:', SCRIPT_URL);
      if (url !== null) {
        SCRIPT_URL = url.trim();
        localStorage.setItem('hac_script_url', SCRIPT_URL);
        if (SCRIPT_URL) loadEditsFromSheet();
      }
    };

    saveEdits();
    renderTable();
    loadEditsFromSheet();
